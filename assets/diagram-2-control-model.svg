<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 584" role="img" aria-label="Two-layer control model">
<style>
  text{font-family:Consolas,Menlo,'DejaVu Sans Mono',monospace;fill:#E8ECF5}
  .ttl{font-size:15px;font-weight:700;fill:#E8ECF5}
  .stp{font-size:11px;font-weight:700;fill:#FFB347;letter-spacing:2px}
  .n-title{font-size:14px;font-weight:700}
  .n-sub{font-size:11px;fill:#98A2B8}
  .edge{stroke:#FFB347;stroke-width:2;fill:none}
  .edge.data{stroke:#5FE3D0;stroke-width:2;stroke-dasharray:5 4}
  .edge.ctl{stroke:#FF5C8A;stroke-width:1.5;opacity:.85;fill:none}
  .elabel{font-size:11px;fill:#98A2B8}
  .elabel.data{fill:#5FE3D0}
  .elabel.ctl{fill:#FF5C8A}
  .node{fill:#0E1322;stroke:#31406A;stroke-width:1}
  .node.hot{stroke:#FFB347;stroke-width:1.5;filter:url(#glow2)}
  .node.data{stroke:#5FE3D0}
  .node.ctl{stroke:#FF5C8A}
  .chip{fill:url(#chk2);stroke:#31406A;stroke-width:1}
  .marquee{fill:none;stroke:#FFB347;stroke-width:1.5;stroke-dasharray:4 4}
  @media (prefers-reduced-motion:no-preference){
    .marquee{animation:march2 1.2s linear infinite}
    @keyframes march2{to{stroke-dashoffset:-16}}
  }
</style>
<defs>
  <pattern id="chk2" width="8" height="8" patternUnits="userSpaceOnUse">
    <rect width="8" height="8" fill="#1A2136"/>
    <rect width="4" height="4" fill="#2A3452"/>
    <rect x="4" y="4" width="4" height="4" fill="#2A3452"/>
  </pattern>
  <filter id="glow2" x="-30%" y="-30%" width="160%" height="160%">
    <feDropShadow dx="0" dy="0" stdDeviation="7" flood-color="#FFB347" flood-opacity="0.28"/>
  </filter>
  <marker id="arr2" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto">
    <path d="M0 0 L8 4 L0 8 z" fill="#FFB347"/>
  </marker>
  <marker id="arrCtl2" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto">
    <path d="M0 0 L8 4 L0 8 z" fill="#FF5C8A"/>
  </marker>
</defs>

<rect x="0" y="0" width="1000" height="584" fill="#121828"/>
<rect x="0.5" y="0.5" width="999" height="583" fill="none" stroke="#232D47"/>

<text class="stp" x="20" y="28">[2/5]</text>
<text class="ttl" x="84" y="28">CONTROL MODEL — rules own strategy, the net shapes feel</text>

<g transform="translate(0,48)">
  <g>
    <rect class="node data" x="250" y="20" width="500" height="96"/>
    <rect class="chip" x="726" y="28" width="14" height="14"/>
    <text class="n-title" x="264" y="46">Observation — 356 floats</text>
    <text class="n-sub" x="264" y="66">self · ammo · weapon economy · flags</text>
    <text class="n-sub" x="264" y="85">enemies · projectiles · teammates</text>
    <text class="n-sub" x="264" y="104">game state · tile awareness · map context</text>
  </g>

  <g>
    <rect class="node ctl" x="120" y="190" width="320" height="76"/>
    <text class="n-title" x="134" y="216">RULE BRAIN</text>
    <text class="n-sub" x="134" y="236">roles · objectives · routes</text>
    <text class="n-sub" x="134" y="255">playmaking · dodge doctrine</text>
  </g>
  <g>
    <rect class="node" x="560" y="190" width="320" height="64"/>
    <rect class="chip" x="856" y="198" width="14" height="14"/>
    <text class="n-title" x="574" y="216">PPO POLICY (advisor)</text>
    <text class="n-sub" x="574" y="236">move(9) · fire(2) · aim(128)</text>
  </g>

  <g>
    <rect class="node hot" x="300" y="340" width="400" height="96"/>
    <rect class="marquee" x="295" y="335" width="410" height="106"/>
    <text class="n-title" x="314" y="366">Influence blend</text>
    <text class="n-sub" x="314" y="386">urgency-weighted movement</text>
    <text class="n-sub" x="314" y="405">aim offset around chosen target</text>
    <text class="n-sub" x="314" y="424">fire = policy OR close-range safety</text>
  </g>

  <g>
    <rect class="node data" x="360" y="470" width="280" height="52"/>
    <rect class="chip" x="616" y="478" width="14" height="14"/>
    <text class="n-title" x="374" y="492">Bot inputs</text>
    <text class="n-sub" x="374" y="511">keys · cursor · fire</text>
  </g>

  <!-- observation split -->
  <path class="edge" d="M400 116 V150 H280 V190" marker-end="url(#arr2)"/>
  <path class="edge" d="M600 116 V150 H720 V190" marker-end="url(#arr2)"/>

  <!-- rule -> blend -->
  <path class="edge ctl" d="M280 266 V300 H420 V340" marker-end="url(#arrCtl2)"/>
  <text class="elabel ctl" x="272" y="286" text-anchor="end">strategy urgency</text>
  <text class="elabel ctl" x="272" y="302" text-anchor="end">(high near objectives)</text>

  <!-- net -> blend -->
  <path class="edge" d="M720 254 V300 H580 V340" marker-end="url(#arr2)"/>
  <text class="elabel" x="728" y="284" text-anchor="start">combat motion +</text>
  <text class="elabel" x="728" y="300" text-anchor="start">target-relative aim offset</text>

  <!-- blend -> out -->
  <path class="edge" d="M500 436 V470" marker-end="url(#arr2)"/>
</g>
</svg>
